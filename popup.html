<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 330px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafafa;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #4f46e5;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status.ok {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
    }
    .status.error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover:not(:disabled) { background: #4338ca; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .btn-secondary:hover:not(:disabled) { background: #d1d5db; }
    .btn-success { background: #059669; color: white; }
    .btn-success:hover:not(:disabled) { background: #047857; }
    .link {
      display: block;
      text-align: center;
      color: #4f46e5;
      font-size: 12px;
      margin-top: 10px;
      cursor: pointer;
      text-decoration: none;
    }
    .link:hover { text-decoration: underline; }
    #lastQuestion {
      margin-top: 10px;
      padding: 10px 12px;
      background: #f5f3ff;
      border-radius: 8px;
      font-size: 12px;
      border-left: 3px solid #4f46e5;
      max-height: 80px;
      overflow: hidden;
      line-height: 1.4;
      display: none;
    }
    .sep {
      height: 1px;
      background: #e5e7eb;
      margin: 8px 0;
    }
    #telegramStatus {
      font-size: 11px;
      text-align: center;
      margin-top: 6px;
      color: #9ca3af;
      display: none;
    }
    #telegramStatus.on {
      color: #059669;
      display: block;
    }
  </style>
</head>
<body>
  <h2>🤖 Agente IA Proactivo</h2>

  <div class="status error" id="status">Cargando...</div>

  <button class="btn btn-primary" id="toggleChat">💬 Abrir chat en esta página</button>
  <button class="btn btn-success" id="captureBtn">📸 Analizar esta página</button>

  <div id="lastQuestion"></div>

  <div id="telegramStatus">📨 Telegram activo</div>
  <button class="btn btn-secondary" id="testTelegramBtn" style="margin-top:6px;font-size:12px;padding:6px;">📨 Probar Telegram</button>

  <div class="sep"></div>
  <a class="link" id="optionsLink">⚙️ Configuración de API</a>

  <script src="popup.js"></script>
</body>
</html>
